<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>876543210.com
    </title>
    <style>
        :root {
            --primary: #2ecc71;
            --danger: #e74c3c;
            --dark: #1a1a1a;
            --light: #f4f4f4;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: white;
            overflow: hidden;
        }

        /* --- AUTH & ADMIN STYLES --- */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }

        .card {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-main { background: var(--primary); color: white; margin-top: 10px; }
        .btn-main:hover { background: #27ae60; }
        
        .link-text {
            display: block;
            margin-top: 15px;
            font-size: 13px;
            color: #3498db;
            cursor: pointer;
        }

        #adminPanel {
            display: none;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            color: #333;
        }

        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #f8f9fa; }

        /* --- GAME STYLES --- */
        #gameWrapper { display: none; }
        canvas { display: block; background: #87CEEB; }
        #ui {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.6); padding: 10px 20px;
            border-radius: 8px; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="authOverlay" class="overlay">
        <div id="authCard" class="card">
            <h2 id="authTitle">Kirish</h2>
            <p id="msg" style="font-size: 13px;"></p>
            <input type="email" id="email" placeholder="Gmail manzilingiz">
            <input type="password" id="password" placeholder="Parol">
            <button class="btn-main" onclick="handleAuth()">Davom etish</button>
            <span class="link-text" onclick="toggleAuthMode()" id="toggleLink">Hisobingiz yo'qmi? Ro'yxatdan o'ting</span>
            <span class="link-text" style="color: #999;" onclick="askAdmin()">Admin Panel</span>
        </div>

        <div id="adminPanel" class="card">
            <h2 style="margin-top:0">Admin Boshqaruvi</h2>
            <table>
                <thead>
                    <tr>
                        <th>Gmail</th>
                        <th>Parol</th>
                    </tr>
                </thead>
                <tbody id="userTableBody"></tbody>
            </table>
            <button class="btn-main" style="background:#333; margin-top:20px" onclick="closeAdmin()">Yopish</button>
            <button class="btn-main" style="background:var(--danger);" onclick="clearAllData()">Bazani tozalash</button>
        </div>
    </div>

    <div id="gameWrapper">
        <div id="ui">Ball: <span id="score">0</span></div>
        <canvas id="gameCanvas"></canvas>
    </div>

<script>
    let isLoginMode = true;
    const authOverlay = document.getElementById('authOverlay');
    const authCard = document.getElementById('authCard');
    const adminPanel = document.getElementById('adminPanel');
    const gameWrapper = document.getElementById('gameWrapper');
    const msg = document.getElementById('msg');

    // --- AUTH LOGIKASI ---
    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('authTitle').innerText = isLoginMode ? "Kirish" : "Ro'yxatdan o'tish";
        document.getElementById('toggleLink').innerText = isLoginMode ? "Hisobingiz yo'qmi? Ro'yxatdan o'ting" : "Hisobingiz bormi? Kirish";
        msg.innerText = "";
    }

    function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        let users = JSON.parse(localStorage.getItem('gameUsers')) || [];

        if (!email || !pass) {
            msg.innerText = "Ma'lumotlarni to'ldiring!";
            msg.style.color = "red";
            return;
        }

        if (isLoginMode) {
            const user = users.find(u => u.email === email && u.pass === pass);
            if (user) {
                startTheGame();
            } else {
                msg.innerText = "Xato gmail yoki parol!";
                msg.style.color = "red";
            }
        } else {
            if (users.find(u => u.email === email)) {
                msg.innerText = "Bu gmail band!";
                msg.style.color = "orange";
            } else {
                users.push({ email, pass });
                localStorage.setItem('gameUsers', JSON.stringify(users));
                msg.innerText = "Muvaffaqiyatli! Endi kiring.";
                msg.style.color = "green";
                toggleAuthMode();
            }
        }
    }

    // --- ADMIN LOGIKASI ---
    function askAdmin() {
        const p = prompt("Admin parolini kiriting (Standart: 7777):");
        if (p === "aziz2010") {
            authCard.style.display = "none";
            adminPanel.style.display = "block";
            renderAdminTable();
        } else {
            alert("Xato parol!");
        }
    }

    function renderAdminTable() {
        const users = JSON.parse(localStorage.getItem('gameUsers')) || [];
        const tbody = document.getElementById('userTableBody');
        tbody.innerHTML = users.map(u => `<tr><td>${u.email}</td><td>${u.pass}</td></tr>`).join('');
    }

    function closeAdmin() {
        adminPanel.style.display = "none";
        authCard.style.display = "block";
    }

    function clearAllData() {
        if(confirm("Haqiqatdan ham hamma ma'lumotlarni o'chirmoqchimisiz?")) {
            localStorage.removeItem('gameUsers');
            renderAdminTable();
        }
    }

    // --- O'YIN LOGIKASI ---
    function startTheGame() {
        authOverlay.style.display = "none";
        gameWrapper.style.display = "block";
        initGame();
    }

    function initGame() {
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let player = { x: 50, y: 100, w: 30, h: 30, dy: 0, dx: 0, jump: false };
        let platforms = [
            {x: 0, y: canvas.height - 50, w: canvas.width, h: 50},
            {x: 200, y: canvas.height - 180, w: 150, h: 20},
            {x: 450, y: canvas.height - 300, w: 150, h: 20}
        ];

        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        function update() {
            if (keys['ArrowRight'] || keys['KeyD']) player.dx = 5;
            else if (keys['ArrowLeft'] || keys['KeyA']) player.dx = -5;
            else player.dx = 0;

            if ((keys['ArrowUp'] || keys['KeyW']) && !player.jump) {
                player.dy = -15;
                player.jump = true;
            }

            player.dy += 0.8; // Gravity
            player.x += player.dx;
            player.y += player.dy;

            // To'qnashuvlar
            player.jump = true;
            platforms.forEach(p => {
                if (player.x < p.x + p.w && player.x + player.w > p.x &&
                    player.y < p.y + p.h && player.y + player.h > p.y) {
                    if (player.dy > 0) {
                        player.y = p.y - player.h;
                        player.dy = 0;
                        player.jump = false;
                    }
                }
            });

            // Ekrandan chiqish
            if (player.y > canvas.height) { player.x = 50; player.y = 100; score = 0; }
            
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Qahramon
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(player.x, player.y, player.w, player.h);
            // Platformalar
            ctx.fillStyle = "#34495e";
            platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));
            document.getElementById('score').innerText = score;
        }
        update();
    }
</script>
</body>
</html>
